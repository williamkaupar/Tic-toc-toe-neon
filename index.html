<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Tic Tac Toe</title>
<style>
  /* ===== RESET & BASE ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a0a; color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
  }
  .hidden { display: none !important; }
  .glow-x { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.6), 0 0 20px rgba(255,51,51,0.4); }
  .glow-o { color: #3388ff; text-shadow: 0 0 10px rgba(51,136,255,0.6), 0 0 20px rgba(51,136,255,0.4); }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-particles {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute; border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }
  .bg-orb.orb1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,51,51,0.15), transparent 70%);
    top: 10%; left: 10%;
    animation-delay: 0s;
  }
  .bg-orb.orb2 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(51,136,255,0.15), transparent 70%);
    bottom: 15%; right: 10%;
    animation-delay: -3s;
  }
  .bg-orb.orb3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,255,255,0.1), transparent 70%);
    top: 50%; left: 50%;
    animation-delay: -5s;
  }
  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
    100% { transform: translate(10px, -10px) scale(1.05); }
  }

  /* ===== MENU SCREEN ===== */
  #menu-screen {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    padding: 20px;
  }
  .menu-title {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900; letter-spacing: 4px; margin-bottom: 40px;
    background: linear-gradient(90deg, #ff3333, #3388ff, #ff3333);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 3s linear infinite;
  }
  @keyframes gradientShift {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  .menu-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 30px 40px;
    width: 100%; max-width: 400px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,255,255,0.05);
  }
  .menu-label {
    font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px;
    color: #888; margin-bottom: 12px; display: block;
  }
  .mode-options { display: flex; gap: 10px; margin-bottom: 24px; }
  .mode-btn {
    flex: 1; padding: 14px 10px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #ccc; font-size: 0.9rem;
    border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
    font-weight: 600; text-align: center;
  }
  .mode-btn:hover, .mode-btn.active {
    border-color: #ff3333; color: #ff3333;
    background: rgba(255,51,51,0.1); box-shadow: 0 0 15px rgba(255,51,51,0.2);
  }
  .difficulty-options { display: flex; gap: 8px; margin-bottom: 24px; }
  .diff-btn {
    flex: 1; padding: 10px 8px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: #ccc; font-size: 0.8rem;
    border-radius: 10px; cursor: pointer; transition: all 0.3s ease;
    font-weight: 600; text-align: center;
  }
  .diff-btn:hover, .diff-btn.active {
    border-color: #3388ff; color: #3388ff;
    background: rgba(51,136,255,0.1); box-shadow: 0 0 15px rgba(51,136,255,0.2);
  }
  .play-btn {
    width: 100%; padding: 16px; font-size: 1.2rem; font-weight: 700;
    border: none; border-radius: 14px; cursor: pointer;
    background: linear-gradient(135deg, #ff3333, #3388ff);
    color: #000; letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .play-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(255,51,51,0.4), 0 0 60px rgba(51,136,255,0.2);
  }
  .play-btn::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
  }
  .play-btn:hover::after { left: 100%; }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 1;
    padding: 10px 20px 20px;
  }

  /* ===== HEADER WITH SCORE ===== */
  .game-header {
    width: 100%; max-width: 400px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 15px;
    flex-shrink: 0;
  }
  .score-display {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .score-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 50px;
  }
  .score-box .score-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .score-box .score-value {
    font-size: 1.4rem;
    font-weight: 900;
    line-height: 1;
  }
  .score-box.x .score-label { color: #ff3333; }
  .score-box.x .score-value { color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.5); }
  .score-box.o .score-label { color: #3388ff; }
  .score-box.o .score-value { color: #3388ff; text-shadow: 0 0 10px rgba(51,136,255,0.5); }
  .score-divider {
    font-size: 1.2rem;
    font-weight: 700;
    color: #555;
  }

  .turn-indicator {
    font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .turn-pill {
    padding: 4px 10px; border-radius: 16px; font-size: 0.9rem; font-weight: 900;
    border: 2px solid; transition: all 0.3s ease;
  }
  .turn-pill.x { border-color: #ff3333; color: #ff3333; box-shadow: 0 0 10px rgba(255,51,51,0.3); }
  .turn-pill.o { border-color: #3388ff; color: #3388ff; box-shadow: 0 0 10px rgba(51,136,255,0.3); }

  .header-btns { display: flex; gap: 10px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
    color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; font-size: 1.1rem;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.15); color: #fff; transform: scale(1.1); }

  /* ===== BOARD - CENTERED ===== */
  .board-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 8px;
    width: 316px;
    height: 316px;
    flex-shrink: 0;
  }

  /* ===== CLEAN BOARD CELLS - NO ANIMATION ===== */
  .cell {
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.3s ease, border-color 0.3s ease;
    position: relative;
    user-select: none;
    overflow: hidden;
    flex-shrink: 0;
  }
  .cell:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
  }
  .cell.win {
    animation: winPulse 1s ease infinite;
    background: rgba(255,255,255,0.1);
  }
  @keyframes winPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* ===== SVG MARKS - X RED, O BLUE ===== */
  .cell svg {
    width: 60px;
    height: 60px;
    display: block;
    flex-shrink: 0;
  }

  /* NORMAL (not oldest) - full bright color */
  .cell .mark-x {
    stroke: #ff3333;
    stroke-width: 8;
    stroke-linecap: round;
    filter: drop-shadow(0 0 8px rgba(255,51,51,0.6));
  }
  .cell .mark-o {
    stroke: #3388ff;
    stroke-width: 8;
    stroke-linecap: round;
    fill: none;
    filter: drop-shadow(0 0 8px rgba(51,136,255,0.6));
  }

  /* OLDEST MARK - dim color (will be removed next) */
  .cell .mark-x.oldest {
    stroke: #661111;
    filter: drop-shadow(0 0 4px rgba(255,51,51,0.2));
  }
  .cell .mark-o.oldest {
    stroke: #112266;
    filter: drop-shadow(0 0 4px rgba(51,136,255,0.2));
  }

  /* PLACE ANIMATION - only on new X/O */
  .cell .mark-x.animate {
    stroke-dasharray: 120;
    stroke-dashoffset: 120;
    animation: drawX 0.4s ease forwards;
  }
  @keyframes drawX {
    to { stroke-dashoffset: 0; }
  }
  .cell .mark-o.animate {
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    animation: drawO 0.4s ease forwards;
  }
  @keyframes drawO {
    to { stroke-dashoffset: 0; }
  }

  /* ===== POPUPS ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(5px); opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .popup {
    background: rgba(20,20,35,0.95); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px; padding: 40px 30px; text-align: center;
    max-width: 340px; width: 90%; transform: scale(0.8); transition: transform 0.3s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,255,255,0.1);
  }
  .overlay.show .popup { transform: scale(1); }
  .popup-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }
  .popup-sub { color: #888; font-size: 0.95rem; margin-bottom: 25px; }
  .popup-btns { display: flex; gap: 12px; justify-content: center; }
  .popup-btn {
    padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.95rem;
    border: none; cursor: pointer; transition: all 0.3s ease;
  }
  .popup-btn.primary {
    background: linear-gradient(135deg, #ff3333, #3388ff); color: #000;
  }
  .popup-btn.primary:hover {
    box-shadow: 0 0 20px rgba(255,51,51,0.4); transform: translateY(-2px);
  }
  .popup-btn.secondary {
    background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
  }
  .popup-btn.secondary:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* ===== SUPPORT BAR ===== */
  .support-bar {
    width: 100%; max-width: 500px;
    display: flex; justify-content: center; gap: 16px; padding: 15px 0;
    flex-shrink: 0;
  }
  .support-btn {
    display: flex; align-items: center; gap: 8px; padding: 10px 20px;
    border-radius: 12px; font-weight: 600; font-size: 0.85rem;
    text-decoration: none; color: #fff; transition: all 0.3s ease;
    border: none; cursor: pointer;
  }
  .support-btn:hover { transform: translateY(-2px) scale(1.05); }
  .support-btn svg { width: 18px; height: 18px; }
  .yt-btn {
    background: linear-gradient(135deg, #ff0000, #cc0000);
    box-shadow: 0 4px 15px rgba(255,0,0,0.3);
  }
  .yt-btn:hover { box-shadow: 0 6px 25px rgba(255,0,0,0.5); }
  .ig-btn {
    background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    box-shadow: 0 4px 15px rgba(220,39,67,0.3);
  }
  .ig-btn:hover { box-shadow: 0 6px 25px rgba(220,39,67,0.5); }

  /* ===== SOUND TOGGLE ===== */
  .sound-toggle {
    position: fixed; bottom: 80px; right: 20px;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
    color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; z-index: 50; font-size: 1.2rem;
  }
  .sound-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .sound-toggle.muted { opacity: 0.5; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 400px) {
    .score-box { padding: 4px 10px; min-width: 40px; }
    .score-box .score-label { font-size: 0.6rem; }
    .score-box .score-value { font-size: 1.1rem; }
    .score-divider { font-size: 1rem; }
    .turn-indicator { font-size: 0.85rem; padding: 4px 8px; }
    .board {
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(3, 80px);
      gap: 6px;
      width: 252px;
      height: 252px;
    }
    .cell { width: 80px; height: 80px; border-radius: 12px; }
    .cell svg { width: 48px; height: 48px; }
  }
</style>

    </div>
  </div>
  <div class="overlay" id="draw-overlay">
    <div class="popup">
      <div class="popup-title" style="color:#ffcc00;">It's a Draw!</div>
      <div class="popup-sub">No one wins this round.</div>
      <div class="popup-bns">
        <button class="popup-btn primary" onclick="restartGame()">Play Again</button>
        <button class="popup-btn secondary" onclick="goHome()">Menu</button>
      </div>
    </div>
  </div>

  <!-- ===== SOUND TOGGLE ===== -->
  <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">&#x1F50A;</button>
</div>

<script>
  /* ===== CREATE BACKGROUND PARTICLES ===== */
  const particleContainer = document.getElementById('bg-particles');
  const colors = ['#ff3333', '#3388ff', '#00ffff', '#ff00ff', '#00ff00'];
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.boxShadow = `0 0 ${size * 3}px ${p.style.background}`;
    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    particleContainer.appendChild(p);
  }

  /* ===== GAME STATE ===== */
  let gameMode = 'pvp';
  let botDiff = 'easy';
  let board = Array(9).fill(null);
  let turn = 'X';
  let historyX = [];
  let historyO = [];
  let gameOver = false;
  let soundEnabled = true;
  let botPlayer = 'O';
  let scoreX = 0;
  let scoreO = 0;
  let lastPlacedIndex = -1; // track which cell was just placed for animation

  /* ===== SVG MARKS - X RED, O BLUE ===== */
  const svgX = '<svg viewBox="0 0 100 100"><line class="mark-x" x1="20" y1="20" x2="80" y2="80"/><line class="mark-x" x1="80" y1="20" x2="20" y2="80"/></svg>';
  const svgO = '<svg viewBox="0 0 100 100"><circle class="mark-o" cx="50" cy="50" r="35"/></svg>';

  /* ===== AUDIO ===== */
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }
  function playTone(freq, type='sine', duration=0.15, vol=0.15) {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }
  function playPlaceSound(player) {
    playTone(player === 'X' ? 523 : 659, 'sine', 0.12, 0.12);
  }
  function playWinSound() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.15), i * 120));
  }
  function playDrawSound() {
    [392, 370, 349].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.3, 0.12), i * 150));
  }
  function playRemoveSound() {
    playTone(0, 'sawtooth', 0.1, 0.08);
  }

  /* ===== MENU ===== */
  function selectMode(mode) {
    gameMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    const diffSec = document.getElementById('difficulty-section');
    diffSec.style.display = mode === 'pvb' ? 'block' : 'none';
    diffSec.style.opacity = mode === 'pvb' ? '1' : '0';
    diffSec.style.transition = 'opacity 0.3s ease';
  }
  function selectDiff(diff) {
    botDiff = diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
  }
  function startGame() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    initGame();
  }
  function goHome() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('draw-overlay').classList.remove('show');
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
    if (document.fullscreenElement) document.exitFullscreen();
  }

  /* ===== SCORE ===== */
  function updateScoreUI() {
    document.getElementById('score-x').textContent = scoreX;
    document.getElementById('score-o').textContent = scoreO;
  }
  function resetScores() {
    scoreX = 0; scoreO = 0;
    updateScoreUI();
  }

  /* ===== GAME LOGIC ===== */
  function initGame() {
    board = Array(9).fill(null);
    historyX = []; historyO = [];
    turn = 'X';
    gameOver = false;
    lastPlacedIndex = -1;
    updateTurnUI();
    updateScoreUI();
    renderBoard();
  }
  function restartGame() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('draw-overlay').classList.remove('show');
    initGame();
  }
  function updateTurnUI() {
    const pill = document.getElementById('turn-pill');
    pill.textContent = turn;
    pill.className = 'turn-pill ' + (turn === 'X' ? 'x' : 'o');
  }

  /* ===== RENDER BOARD ===== */
  function renderBoard() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach((cell, i) => {
      cell.innerHTML = '';
      cell.className = 'cell';

      if (board[i]) {
        const player = board[i];
        const isNewlyPlaced = (i === lastPlacedIndex);
        const hist = player === 'X' ? historyX : historyO;
        const isOldest = (hist.length >= 3 && hist[0] === i);

        // Build SVG with proper classes
        let svgHTML = player === 'X' ? svgX : svgO;
        const parser = new DOMParser();
        const doc = parser.parseFromString(svgHTML, 'image/svg+xml');
        const svg = doc.documentElement;

        // Add animate class ONLY to newly placed mark
        const marks = svg.querySelectorAll(player === 'X' ? '.mark-x' : '.mark-o');
        marks.forEach(mark => {
          if (isNewlyPlaced) {
            mark.classList.add('animate');
          }
          if (isOldest) {
            mark.classList.add('oldest');
          }
        });

        cell.innerHTML = svg.outerHTML;
      }
    });
  }

  function handleCellClick(index) {
    if (gameOver || board[index]) return;
    makeMove(index);
  }

  function makeMove(index) {
    const player = turn;
    const hist = player === 'X' ? historyX : historyO;

    // If already 3 marks, remove oldest (no animation on existing marks)
    if (hist.length >= 3) {
      const oldest = hist.shift();
      board[oldest] = null;
      // Just clear the cell - no animation on the old mark
      const oldCell = document.querySelector(`.cell[data-index="${oldest}"]`);
      if (oldCell) {
        oldCell.innerHTML = '';
      }
      playRemoveSound();
    }

    // Place new mark
    board[index] = player;
    hist.push(index);
    lastPlacedIndex = index; // mark this as newly placed for animation
    playPlaceSound(player);
    renderBoard();

    const winLine = checkWin(player);
    if (winLine) {
      gameOver = true;
      if (player === 'X') scoreX++; else scoreO++;
      updateScoreUI();
      highlightWin(winLine);
      playWinSound();
      setTimeout(() => showWin(player), 600);
      return;
    }
    if (isBoardFull()) {
      gameOver = true;
      playDrawSound();
      setTimeout(() => showDraw(), 600);
      return;
    }

    turn = turn === 'X' ? 'O' : 'X';
    updateTurnUI();

    if (gameMode === 'pvb' && turn === botPlayer && !gameOver) {
      setTimeout(botMove, 400);
    }
  }

  function checkWin(player) {
    const lines = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6]
    ];
    for (const line of lines) {
      if (line.every(i => board[i] === player)) return line;
    }
    return null;
  }
  function isBoardFull() {
    return board.every(c => c !== null);
  }
  function highlightWin(line) {
    line.forEach(i => {
      document.querySelector(`.cell[data-index="${i}"]`).classList.add('win');
    });
  }
  function showWin(player) {
    document.getElementById('win-title').textContent = player + ' Wins!';
    document.getElementById('win-title').className = 'popup-title ' + (player === 'X' ? 'glow-x' : 'glow-o');
    document.getElementById('win-overlay').classList.add('show');
  }
  function showDraw() {
    document.getElementById('draw-overlay').classList.add('show');
  }

  /* ===== BOT AI ===== */
  function botMove() {
    if (gameOver) return;
    let move;
    if (botDiff === 'easy') {
      move = randomMove();
    } else if (botDiff === 'normal') {
      const r = Math.random();
      if (r < 0.4) move = randomMove();
      else if (r < 0.7) move = findWinningMove(botPlayer) || findBlockingMove() || randomMove();
      else move = findBlockingMove() || findWinningMove(botPlayer) || randomMove();
    } else {
      move = minimaxMove();
    }
    if (move !== undefined && move !== null) makeMove(move);
  }
  function randomMove() {
    const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
    return empty.length ? empty[Math.floor(Math.random() * empty.length)] : null;
  }
  function findWinningMove(player) {
    for (let i = 0; i < 9; i++) {
      if (board[i]) continue;
      const b = board.slice(); b[i] = player;
      if (checkWinSim(b, player)) return i;
    }
    return null;
  }
  function findBlockingMove() {
    const opponent = botPlayer === 'X' ? 'O' : 'X';
    return findWinningMove(opponent);
  }
  function checkWinSim(b, player) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(line => line.every(i => b[i] === player));
  }

  /* ===== MINIMAX ===== */
  function minimaxMove() {
    let bestScore = -Infinity;
    let bestMove = null;
    const opponent = botPlayer === 'X' ? 'O' : 'X';
    const empty = board.map((v,i) => v === null ? i : null).filter(v => v !== null);
    for (const i of empty) {
      const sim = simulateMove(board, historyX.slice(), historyO.slice(), botPlayer, i);
      const score = minimax(sim.board, sim.hx, sim.ho, 0, false, opponent, botPlayer, -Infinity, Infinity);
      if (score > bestScore) { bestScore = score; bestMove = i; }
    }
    return bestMove !== null ? bestMove : randomMove();
  }
  function simulateMove(b, hx, ho, player, idx) {
    const nb = b.slice();
    const nhx = hx.slice(); const nho = ho.slice();
    const hist = player === 'X' ? nhx : nho;
    if (hist.length >= 3) {
      const oldest = hist.shift();
      nb[oldest] = null;
    }
    nb[idx] = player;
    hist.push(idx);
    return { board: nb, hx: nhx, ho: nho };
  }
  function minimax(b, hx, ho, depth, isMaximizing, currentPlayer, botP, alpha, beta) {
    const opponent = botP === 'X' ? 'O' : 'X';
    if (checkWinSim(b, botP)) return 10 - depth;
    if (checkWinSim(b, opponent)) return depth - 10;
    if (b.every(c => c !== null)) return 0;
    if (depth >= 5) return evaluateBoard(b, botP, opponent);

    const empty = b.map((v,i) => v === null ? i : null).filter(v => v !== null);
    if (isMaximizing) {
      let maxEval = -Infinity;
      for (const i of empty) {
        const sim = simulateMove(b, hx.slice(), ho.slice(), currentPlayer, i);
        const evalScore = minimax(sim.board, sim.hx, sim.ho, depth + 1, false, opponent, botP, alpha, beta);
        maxEval = Math.max(maxEval, evalScore);
        alpha = Math.max(alpha, evalScore);
        if (beta <= alpha) break;
      }
      return maxEval;
    } else {
      let minEval = Infinity;
      for (const i of empty) {
        const sim = simulateMove(b, hx.slice(), ho.slice(), currentPlayer, i);
        const evalScore = minimax(sim.board, sim.hx, sim.ho, depth + 1, true, opponent, botP, alpha, beta);
        minEval = Math.min(minEval, evalScore);
        beta = Math.min(beta, evalScore);
        if (beta <= alpha) break;
      }
      return minEval;
    }
  }
  function evaluateBoard(b, botP, opp) {
    let score = 0;
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (const line of lines) {
      const vals = line.map(i => b[i]);
      const botCount = vals.filter(v => v === botP).length;
      const oppCount = vals.filter(v => v === opp).length;
      const emptyCount = vals.filter(v => v === null).length;
      if (botCount === 2 && emptyCount === 1) score += 3;
      if (oppCount === 2 && emptyCount === 1) score -= 3;
      if (botCount === 1 && emptyCount === 2) score += 1;
      if (oppCount === 1 && emptyCount === 2) score -= 1;
    }
    return score;
  }

  /* ===== SOUND TOGGLE ===== */
  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-toggle');
    btn.innerHTML = soundEnabled ? '&#x1F50A;' : '&#x1F507;';
    btn.classList.toggle('muted', !soundEnabled);
  }

  /* ===== INIT ===== */
  selectMode('pvp');
</script>
</body>
</html>
